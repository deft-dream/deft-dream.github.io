<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- 猫爪合拢状态 -->
  
  <!-- 左上肉垫（向下移动） -->
  <ellipse cx="9" cy="11" rx="4" ry="4.5" fill="#ffb6c1"/>
  <ellipse cx="9" cy="11" rx="2.5" ry="3" fill="#ff69b4"/>
  
  <!-- 右上肉垫（向下移动） -->
  <ellipse cx="23" cy="11" rx="4" ry="4.5" fill="#ffb6c1"/>
  <ellipse cx="23" cy="11" rx="2.5" ry="3" fill="#ff69b4"/>
  
  <!-- 左中肉垫（向中间移动） -->
  <ellipse cx="6" cy="17" rx="3.5" ry="4" fill="#ffb6c1"/>
  <ellipse cx="6" cy="17" rx="2" ry="2.5" fill="#ff69b4"/>
  
  <!-- 右中肉垫（向中间移动） -->
  <ellipse cx="26" cy="17" rx="3.5" ry="4" fill="#ffb6c1"/>
  <ellipse cx="26" cy="17" rx="2" ry="2.5" fill="#ff69b4"/>
  
  <!-- 主肉垫（稍微上移） -->
  <ellipse cx="16" cy="21" rx="9" ry="7" fill="#ffb6c1"/>
  <ellipse cx="16" cy="21" rx="6" ry="5" fill="#ff69b4"/>
  
  <!-- 高光 -->
  <ellipse cx="14" cy="19" rx="2" ry="1.5" fill="white" opacity="0.4"/>
</svg>