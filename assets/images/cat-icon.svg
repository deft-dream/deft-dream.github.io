<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景光晕 -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff2d78;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#050510;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0f0"/>
      <stop offset="50%" style="stop-color:#c0c0d0"/>
      <stop offset="100%" style="stop-color:#a0a0b0"/>
    </linearGradient>
    <linearGradient id="ears" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0d0"/>
      <stop offset="100%" style="stop-color:#ff9ec0"/>
    </linearGradient>
  </defs>
  
  <!-- 光晕背景 -->
  <circle cx="50" cy="50" r="45" fill="url(#glow)"/>
  
  <!-- 猫耳朵 -->
  <path d="M25 35 L35 15 L45 35" fill="url(#ears)" stroke="#ff2d78" stroke-width="1"/>
  <path d="M55 35 L65 15 L75 35" fill="url(#ears)" stroke="#ff2d78" stroke-width="1"/>
  <path d="M30 32 L35 20 L40 32" fill="#ff9ec0" opacity="0.8"/>
  <path d="M60 32 L65 20 L70 32" fill="#ff9ec0" opacity="0.8"/>
  
  <!-- 头发 -->
  <ellipse cx="50" cy="40" rx="30" ry="25" fill="url(#hair)"/>
  <path d="M20 40 Q25 55 30 50" fill="url(#hair)" stroke="none"/>
  <path d="M80 40 Q75 55 70 50" fill="url(#hair)" stroke="none"/>
  
  <!-- 脸 -->
  <ellipse cx="50" cy="48" rx="22" ry="18" fill="#ffe0e8"/>
  
  <!-- 眼睛 -->
  <ellipse cx="40" cy="46" rx="5" ry="6" fill="#00f0ff"/>
  <ellipse cx="60" cy="46" rx="5" ry="6" fill="#00f0ff"/>
  <circle cx="41" cy="44" r="2" fill="white"/>
  <circle cx="61" cy="44" r="2" fill="white"/>
  
  <!-- 腮红 -->
  <ellipse cx="32" cy="52" rx="6" ry="3" fill="#ff9ec0" opacity="0.5"/>
  <ellipse cx="68" cy="52" rx="6" ry="3" fill="#ff9ec0" opacity="0.5"/>
  
  <!-- 嘴巴 -->
  <path d="M45 55 Q50 58 55 55" fill="none" stroke="#ff2d78" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 身体（赛博朋克服装） -->
  <path d="M35 65 L30 85 L70 85 L65 65" fill="#0a0a1a" stroke="#00f0ff" stroke-width="1"/>
  <line x1="40" y1="68" x2="40" y2="82" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
  <line x1="50" y1="66" x2="50" y2="84" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
  <line x1="60" y1="68" x2="60" y2="82" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
  
  <!-- 霓虹装饰 -->
  <circle cx="45" cy="72" r="2" fill="#ff2d78" opacity="0.8"/>
  <circle cx="55" cy="75" r="1.5" fill="#00f0ff" opacity="0.8"/>
  
  <!-- 苹果 -->
  <circle cx="75" cy="65" r="8" fill="#ff2d78"/>
  <path d="M75 57 Q78 55 76 58" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <ellipse cx="73" cy="63" rx="2" ry="1" fill="white" opacity="0.3"/>
  
  <!-- 猫须 -->
  <line x1="25" y1="50" x2="15" y2="48" stroke="#c0c0d0" stroke-width="0.8"/>
  <line x1="25" y1="52" x2="15" y2="54" stroke="#c0c0d0" stroke-width="0.8"/>
  <line x1="75" y1="50" x2="85" y2="48" stroke="#c0c0d0" stroke-width="0.8"/>
  <line x1="75" y1="52" x2="85" y2="54" stroke="#c0c0d0" stroke-width="0.8"/>
</svg>